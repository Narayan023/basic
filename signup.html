<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
        }
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }
        .signup-box {
            width: 350px;
            padding: 40px;
            background: rgba(30, 30, 60, 0.8);
            color: #fff;
            margin: 120px auto;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        input {
            width: 80%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 6px;
            border: none;
            outline: none;
        }
        button {
            padding: 12px 30px;
            background: #00c3ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <canvas class="background" id="bg3d"></canvas>
    <div class="signup-box">
        <h2>Sign Up</h2>
        <form>
            <input type="text" placeholder="Username" required><br>
            <input type="email" placeholder="Email" required><br>
            <input type="password" placeholder="Password" required><br>
            <button type="submit">Sign Up</button>
        </form>
    </div>
    <script>
        // Simple 3D background using particles
        const canvas = document.getElementById('bg3d');
        const ctx = canvas.getContext('2d');
        let w = window.innerWidth;
        let h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;
        let particles = [];
        for(let i=0;i<120;i++){
            particles.push({
                x: Math.random()*w,
                y: Math.random()*h,
                z: Math.random()*w,
                r: Math.random()*2+1
            });
        }
        function draw(){
            ctx.clearRect(0,0,w,h);
            for(let p of particles){
                let scale = 200/(p.z+200);
                let px = w/2 + (p.x-w/2)*scale;
                let py = h/2 + (p.y-h/2)*scale;
                ctx.beginPath();
                ctx.arc(px,py,p.r*scale,0,2*Math.PI);
                ctx.fillStyle = `rgba(0,195,255,${0.5+0.5*scale})`;
                ctx.fill();
                p.z -= 1;
                if(p.z < 1) p.z = w;
            }
            requestAnimationFrame(draw);
        }
        draw();
        window.addEventListener('resize',()=>{
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
        });
    </script>
</body>
</html>
